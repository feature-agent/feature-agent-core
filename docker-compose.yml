services:
  nats:
    image: nats:latest
    command: -js
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build: .
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY
      - GITHUB_TOKEN
      - GITHUB_REPO
      - NATS_URL=nats://nats:4222
      - DATA_PATH=/data
      - TARGET_REPO_PATH=/target-repo
      - LOG_LEVEL=INFO
    volumes:
      - agent_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  agent_data:
