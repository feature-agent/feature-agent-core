services:
  nats:
    image: nats:latest
    command: -js -m 8222

  agent:
    build: .
    depends_on:
      - nats
    environment:
      - NATS_URL=nats://nats:4222
      - DATA_PATH=/data
      - LOG_LEVEL=INFO
    volumes:
      - agent_data:/data
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  agent_data:
